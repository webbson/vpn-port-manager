services:
  vpn-port-manager:
    image: webbson/vpn-port-manager:latest
    # build: .  # uncomment to build locally instead of pulling
    container_name: vpn-port-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - vpn-pm-data:/data
    environment:
      # Encryption key for stored VPN + router secrets. Generate with:
      #   openssl rand -hex 32
      # Do not change this after the first boot — rotating invalidates all stored settings.
      - APP_SECRET_KEY=${APP_SECRET_KEY}
      - PORT=3000

volumes:
  vpn-pm-data:
